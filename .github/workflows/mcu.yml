name: Build MCU Firmware

on:
  push:
    branches: [master]
    paths:
      - 'src/mcu/**'
      - '.github/workflows/mcu.yml'
  pull_request:
    branches: [master]
    paths:
      - 'src/mcu/**'
      - '.github/workflows/mcu.yml'
  workflow_dispatch:

jobs:
  build-firmware:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM toolchain and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            build-essential \
            git

      - name: Clone Pico SDK
        run: |
          git clone --depth 1 --branch 2.1.0 \
            https://github.com/raspberrypi/pico-sdk.git \
            $HOME/pico-sdk
          cd $HOME/pico-sdk
          git submodule update --init --depth 1

      - name: Build firmware
        run: |
          cd src/mcu
          mkdir -p build
          cd build
          cmake .. -DPICO_SDK_PATH=$HOME/pico-sdk
          make -j$(nproc)

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-main.uf2
          path: src/mcu/build/main.uf2
          retention-days: 90
          if-no-files-found: error
